<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{

}/*EDITMODE-END*/;

// ── Brand ────────────────────────────────────────────────────
const B = {

  amberBg: '#FFFBEB',
  greenBg: '#F0FDF4',
};

// ── Airtable Integration ─────────────────────────────────────
const AT_BASE  = 'appB4plmscFrAlsxb';
const AT_TABLE = 'tblIWogLXTK0xAHcG';
const AT_TOKEN = 'patpFi3nYObIkCn1S.d01f23bcc60c8f40a1c31f2abbf31712c4b46b15023488949a0c277efc66b36e';
const AT_URL   = `https://api.airtable.com/v0/${AT_BASE}/${AT_TABLE}`;
const AT_HDR   = { 'Authorization': `Bearer ${AT_TOKEN}`, 'Content-Type': 'application/json' };

const statusToAT   = s => ({'open':'Open','assigned':'Assigned','in_progress':'In Progress','resolved':'Resolved','closed':'Closed'}[s]||'Open');
const statusFromAT = s => ({'Open':'open','Assigned':'assigned','In Progress':'in_progress','Resolved':'resolved','Closed':'closed'}[s]||'open');
const sevToAT      = s => s ? s.charAt(0).toUpperCase()+s.slice(1) : 'Medium';
const sevFromAT    = s => (s||'medium').toLowerCase();

function atToTicket(rec){
  const f = rec.fields;
  const title = f['Title'] || '';
  const colonIdx = title.indexOf(':');
  const ticketId = colonIdx > -1 ? title.slice(0, colonIdx).trim() : ('AT-' + rec.id.slice(-5));
  const machine   = colonIdx > -1 ? title.slice(colonIdx+1).trim() : title;
  const rawDate   = f['Created At'];
  let createdAt = '—';
  if(rawDate){
    const d = new Date(rawDate);
    const today = new Date();
    const diff = Math.floor((today - d)/(1000*60*60*24));
    createdAt = diff === 0 ? 'Today ' + d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})
              : diff === 1 ? 'Yesterday'
              : d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
  }
  return {
    airtableId:  rec.id,
    id:          ticketId,
    machine:     machine || '—',
    location:    f['Plant'] || '—',
    category:    f['Category'] || 'Mechanical',
    severity:    sevFromAT(f['Priority']),
    status:      statusFromAT(f['Status']),
    desc:        f['Description'] || '',
    assignedTo:  f['Assigned To'] || null,
    createdBy:   f['Raised By'] || 'Unknown',
    createdAt,
    downtime:    '',
    parts:       '',
    photos:      0,
    resolutionNotes: f['Resolution Notes'] || '',
    resolvedAt:  f['Resolved At'] || null,
  };
}

async function atFetchAll(){
  const res = await fetch(AT_URL + '?sort%5B0%5D%5Bfield%5D=Created+At&sort%5B0%5D%5Bdirection%5D=desc', { headers: AT_HDR });
  if(!res.ok) throw new Error('Fetch failed ' + res.status);
  const data = await res.json();
  return (data.records||[]).map(atToTicket);
}

async function atCreate(fields){
  const res = await fetch(AT_URL, { method:'POST', headers:AT_HDR, body:JSON.stringify({fields}) });
  if(!res.ok) throw new Error('Create failed ' + res.status);
  return atToTicket(await res.json());
}

async function atUpdate(airtableId, fields){
  const res = await fetch(`${AT_URL}/${airtableId}`, { method:'PATCH', headers:AT_HDR, body:JSON.stringify({fields}) });
  if(!res.ok) throw new Error('Update failed ' + res.status);
  return atToTicket(await res.json());
}

function generateTicketId(){
  return 'TKT-' + String(Date.now()).slice(-4);
}

  {id:'TKT-004', machine:'Cooling Tower CT-1', location:'Zone D', category:'Mechanical', severity:'low', status:'resolved', desc:'Fan belt slipping - minor noise but no production impact.', assignedTo:'Suresh M.', createdBy:'Kiran L.', createdAt:'2 days ago', downtime:'30 min', parts:'V-belt A42', photos:0},

// ── Screen: Task List ────────────────────────────────────────
function TaskListScreen({role, tickets, onTicket}){
  const [filter, setFilter] = React.useState('all');
  const [search, setSearch] = React.useState('');
  const filters = [{id:'all',label:'All'},{id:'open',label:'Open'},{id:'assigned',label:'Assigned'},{id:'in_progress',label:'In Progress'},{id:'resolved',label:'Resolved'}];
  const filtered = tickets.filter(t=>{
    if(filter!=='all'&&t.status!==filter) return false;
    if(search && !t.machine.toLowerCase().includes(search.toLowerCase()) && !t.id.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });
  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:B.bg}}>
      {/* Header */}
      <div style={{background:'#fff',padding:'60px 16px 12px',borderBottom:'1px solid '+B.border}}>
        <div style={{fontSize:20,fontWeight:800,color:B.text,marginBottom:12}}>All Tickets</div>
        {/* Search */}
        <div style={{background:B.bg,borderRadius:12,padding:'10px 14px',display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
          <span style={{fontSize:14,color:B.sub}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search machine, ticket ID…" style={{flex:1,border:'none',background:'transparent',fontSize:13,color:B.text,outline:'none',fontFamily:'DM Sans,sans-serif'}}/>
        </div>
        {/* Filters */}
        <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:2}}>
          {filters.map(f=>(
            <button key={f.id} onClick={()=>setFilter(f.id)} style={{padding:'6px 12px',borderRadius:99,border:'none',background:filter===f.id?B.blue:'#F0F4F8',color:filter===f.id?'#fff':B.sub,fontSize:12,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap',flexShrink:0,fontFamily:'DM Sans,sans-serif'}}>
              {f.label}
            </button>
          ))}
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'12px 16px 90px'}}>
        {filtered.length===0
          ? <div style={{textAlign:'center',padding:'40px 20px',color:B.sub,fontSize:13}}>No tickets found</div>
          : filtered.map(t=><TicketCard key={t.id} ticket={t} onPress={()=>onTicket(t)}/>)
        }
      </div>
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────
function App(){
  const saved = (() => { try { return JSON.parse(localStorage.getItem('mm_state')||'{}'); } catch(e){return{};} })();
  const [tweaks, setTweaks] = React.useState({...TWEAK_DEFAULTS, ...saved.tweaks});
  const [screen, setScreen] = React.useState(saved.screen||'login');
  const [role, setRole] = React.useState(saved.role||null);
  const [activeTab, setActiveTab] = React.useState('home');
  const [selectedTicket, setSelectedTicket] = React.useState(null);
  const [tickets, setTickets] = React.useState(TICKETS);
  const [tweaksVisible, setTweaksVisible] = React.useState(false);
  const [loading, setLoading] = React.useState(false);
  const [syncing, setSyncing] = React.useState(false);
  const [syncError, setSyncError] = React.useState(false);

  // ── Fetch tickets from Airtable ──
  const refreshTickets = React.useCallback(async () => {
    setLoading(true);
    try {
      const remote = await atFetchAll();
      setTickets(remote.length > 0 ? remote : TICKETS);
    } catch(e) {
      console.warn('Airtable fetch error:', e.message);
      // keep local data on error
    } finally {
      setLoading(false);
    }
  }, []);

  // Fetch on mount + every 30s auto-refresh
  React.useEffect(()=>{
    refreshTickets();
    const interval = setInterval(refreshTickets, 30000);
    return () => clearInterval(interval);
  }, []);

  React.useEffect(()=>{
    localStorage.setItem('mm_state', JSON.stringify({screen,role,tweaks}));
  },[screen,role,tweaks]);

  // Tweaks postMessage
  React.useEffect(()=>{
    const handler = e => {
      if(e.data?.type==='__activate_edit_mode') setTweaksVisible(true);
      if(e.data?.type==='__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message', handler);
  },[]);

  const setTweak = (k,v) => {
    const next = {...tweaks,[k]:v};
    setTweaks(next);
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]:v}},'*');
  };

  const roleName = r => r==='operator'?'Ramesh K.':r==='supervisor'?'Ranjith K.':r==='technician'?'Suresh M.':r==='stores'?'Stores User':'Admin';

  const handleLogin = r => { setRole(r); setScreen('main'); setActiveTab('home'); refreshTickets(); };
  const handleNav = tab => {
    if(tab==='new') { setScreen('new_ticket'); return; }
    setActiveTab(tab); setScreen('main');
  };
  const handleTicket = t => { setSelectedTicket(t); setScreen('ticket_detail'); };

  // ── Optimistic update helper ──
  const applyAndSync = async (localUpdate, airtableId, atFields, successScreen) => {
    // Optimistic local update
    const updated = localUpdate();
    setSelectedTicket(updated);
    setSyncing(true); setSyncError(false);
    try {
      const synced = await atUpdate(airtableId, atFields);
      setTickets(prev => prev.map(t => t.airtableId === airtableId ? synced : t));
      setSelectedTicket(synced);
    } catch(e) {
      console.warn('Sync error:', e.message);
      setSyncError(true);
      setTimeout(()=>setSyncError(false), 3000);
    } finally {
      setSyncing(false);
    }
    if(successScreen) setScreen(successScreen);
  };

  const handleTicketAction = (action, data) => {
    if(action==='assign'){
      const airtableId = selectedTicket.airtableId;
      applyAndSync(
        () => {
          const u = {...selectedTicket, status:'assigned', assignedTo:data};
          setTickets(prev=>prev.map(t=>t.id===selectedTicket.id?u:t));
          return u;
        },
        airtableId,
        { 'Status': 'Assigned', 'Assigned To': data },
        'success_assign'
      );
    } else if(action==='acknowledge'){
      setScreen('acknowledge');
    } else if(action==='report'){
      setScreen('report');
    }
  };

  const handleAcknowledge = async (eta, note) => {
    const airtableId = selectedTicket.airtableId;
    applyAndSync(
      () => {
        const u = {...selectedTicket, status:'in_progress'};
        setTickets(prev=>prev.map(t=>t.id===selectedTicket.id?u:t));
        return u;
      },
      airtableId,
      { 'Status': 'In Progress', 'Resolution Notes': note ? `[ETA: ${eta}] ${note}` : `ETA: ${eta}` },
      'success_ack'
    );
  };

  const handleReport = async (work, partsUsed, outcome) => {
    const airtableId = selectedTicket.airtableId;
    const newStatus = outcome==='resolved'?'resolved':outcome==='partial'?'in_progress':'open';
    const atStatus  = outcome==='resolved'?'Resolved':outcome==='partial'?'In Progress':'Open';
    applyAndSync(
      () => {
        const u = {...selectedTicket, status:newStatus, resolutionNotes:work};
        setTickets(prev=>prev.map(t=>t.id===selectedTicket.id?u:t));
        return u;
      },
      airtableId,
      {
        'Status': atStatus,
        'Resolution Notes': `${work}\n\nParts used: ${partsUsed}`,
        'Resolved At': outcome==='resolved' ? new Date().toISOString() : undefined,
      },
      'success_report'
    );
  };

  const handleNewTicket = async (form) => {
    const ticketId = generateTicketId();
    const atFields = {
      'Title':       `${ticketId}: ${form.machine}`,
      'Description': form.desc || '',
      'Plant':       form.location || '',
      'Category':    form.category || '',
      'Priority':    sevToAT(form.severity || 'medium'),
      'Status':      'Open',
      'Raised By':   roleName(role),
    };
    setSyncing(true); setSyncError(false);
    try {
      const newTicket = await atCreate(atFields);
      setTickets(prev => [newTicket, ...prev]);
    } catch(e) {
      console.warn('Create error:', e.message);
      // Add local fallback
      const fallback = { id:ticketId, machine:form.machine, location:form.location, category:form.category, severity:form.severity, status:'open', desc:form.desc||'', assignedTo:null, createdBy:roleName(role), createdAt:'Just now', downtime:form.downtime||'', parts:form.parts||'', photos:0, airtableId:null };
      setTickets(prev=>[fallback,...prev]);
      setSyncError(true);
      setTimeout(()=>setSyncError(false),3000);
    } finally {
      setSyncing(false);
    }
    setScreen('success_ticket');
  };

  const renderScreen = () => {
    if(screen==='login') return <LoginScreen onLogin={handleLogin}/>;
    if(screen==='new_ticket') return <NewTicketScreen onBack={()=>setScreen('main')} onSubmit={handleNewTicket}/>;
    if(screen==='ticket_detail'&&selectedTicket) return <TicketDetailScreen ticket={selectedTicket} role={role} onBack={()=>{setScreen('main');}} onAction={handleTicketAction}/>;
    if(screen==='acknowledge'&&selectedTicket) return <AcknowledgeScreen ticket={selectedTicket} onBack={()=>setScreen('ticket_detail')} onAck={handleAcknowledge}/>;
    if(screen==='report'&&selectedTicket) return <ReportScreen ticket={selectedTicket} onBack={()=>setScreen('ticket_detail')} onSubmit={handleReport}/>;
    if(screen==='success_ticket') return <SuccessScreen title="Ticket Raised!" sub="Your issue has been saved to the shared database. The supervisor will assign it shortly." onDone={()=>{setScreen('main');setActiveTab('home');}}/>;
    if(screen==='success_assign') return <SuccessScreen title="Task Assigned!" sub={`Assigned to ${selectedTicket?.assignedTo} and saved to Airtable.`} onDone={()=>{setScreen('main');setActiveTab('home');}}/>;
    if(screen==='success_ack') return <SuccessScreen title="Task Acknowledged!" sub="Status updated to In Progress in the shared database." onDone={()=>{setScreen('main');setActiveTab('tasks');}}/>;
    if(screen==='success_report') return <SuccessScreen title="Report Submitted!" sub="Maintenance report filed and ticket closed in Airtable." onDone={()=>{setScreen('main');setActiveTab('tasks');}}/>;
    // Main tabbed screens
    if(screen==='main'){
      const content = (() => {
        if(activeTab==='notifications') return <NotificationsScreen/>;
        if(activeTab==='profile') return (
          <div style={{padding:'60px 16px',background:B.bg,height:'100%'}}>
            <div style={{background:'#fff',borderRadius:20,padding:'24px',textAlign:'center',border:'1px solid '+B.border,marginBottom:16}}>
              <div style={{width:64,height:64,borderRadius:20,background:B.blue,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,fontWeight:700,margin:'0 auto 12px'}}>{role==='operator'?'R':role==='supervisor'?'S':role==='technician'?'T':role[0].toUpperCase()}</div>
              <div style={{fontSize:16,fontWeight:800,color:B.text}}>{roleName(role)}</div>
              <div style={{fontSize:13,color:B.sub,marginTop:2}}>{role.charAt(0).toUpperCase()+role.slice(1)} · Meerut Plant</div>
              <Chip label={role.toUpperCase()} color={B.blue} bg='#EFF6FF' size='md'/>
            </div>
            <div style={{background:'#fff',borderRadius:16,padding:'14px 16px',border:'1px solid '+B.border,marginBottom:12,display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:8,height:8,borderRadius:99,background:B.teal,flexShrink:0}}/>
              <div>
                <div style={{fontSize:12,fontWeight:600,color:B.text}}>Connected to Airtable</div>
                <div style={{fontSize:11,color:B.sub}}>Live sync · {tickets.length} tickets loaded</div>
              </div>
              <button onClick={refreshTickets} style={{marginLeft:'auto',padding:'5px 10px',borderRadius:8,border:'1px solid '+B.border,background:B.bg,color:B.sub,fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>↻ Refresh</button>
            </div>
            <button onClick={()=>{setScreen('login');setRole(null);}} style={{width:'100%',padding:'14px',borderRadius:14,border:'none',background:B.redBg,color:B.red,fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>Switch Role / Logout</button>
          </div>
        );
        if(role==='technician'){
          if(activeTab==='tasks') return <TechnicianTasksScreen tickets={tickets} onTicket={handleTicket}/>;
          return <DashboardScreen role={role} tickets={tickets.filter(t=>t.assignedTo==='Suresh M.')} onNav={handleNav} onTicket={handleTicket}/>;
        }
        if(role==='supervisor'){
          if(activeTab==='tasks') return <TaskListScreen role={role} tickets={tickets} onTicket={handleTicket}/>;
          return <SupervisorDashboard tickets={tickets} onNav={handleNav} onTicket={handleTicket}/>;
        }
        if(activeTab==='tasks') return <TaskListScreen role={role} tickets={tickets} onTicket={handleTicket}/>;
        return <DashboardScreen role={role} tickets={tickets} onNav={handleNav} onTicket={handleTicket}/>;
      })();
      return (
        <div style={{height:'100%',position:'relative'}}>
          {content}
          <SyncBadge syncing={syncing} error={syncError}/>
          <BottomNav active={activeTab} onNav={handleNav} role={role}/>
        </div>
      );
    }
  };

  return (
    <div className="stage">
      {/* iOS Device */}
      <div style={{transform:'scale(0.88)',transformOrigin:'center center',flexShrink:0}}>
        <IOSDevice width={390} height={844} dark={false}>
          {loading && screen!=='login' && <LoadingOverlay message="Loading tickets from Airtable…"/>}
          {renderScreen()}
        </IOSDevice>
      </div>
      {/* Tweaks */}
      <div className={`tweaks-panel ${tweaksVisible?'visible':''}`}>
        <div className="tweaks-title">Tweaks</div>
        <div className="tweak-row">
          <span className="tweak-label">Role View</span>
          <div className="tweak-options">
            {['operator','technician','supervisor','stores'].map(r=>(
              <button key={r} className={`tweak-btn ${tweaks.role===r?'active':''}`} onClick={()=>{setTweak('role',r);if(r!==role){handleLogin(r);}}}>{r}</button>
            ))}
          </div>
        </div>
        <div className="tweak-row">
          <span className="tweak-label">Current Screen</span>
          <div className="tweak-options">
            {['home','tasks','notifications','new_ticket','ticket_detail'].map(s=>(
              <button key={s} className={`tweak-btn ${(screen==='main'?activeTab:screen)===s?'active':''}`} onClick={()=>{
                if(s==='new_ticket'){setScreen('new_ticket');}
                else if(s==='ticket_detail'){setSelectedTicket(TICKETS[1]);setScreen('ticket_detail');}
                else{setScreen('main');setActiveTab(s);}
              }}>{s.replace('_',' ')}</button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<div id="root"></div>
</body>
</html>
